[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "markitdown-web"
dynamic = ["version"]
description = "A secure web UI for converting files and URLs to Markdown with MarkItDown."
readme = "README.md"
requires-python = ">=3.10,<3.14"
license = "MIT"
authors = [
  { name = "Adam Fourney", email = "adamfo@microsoft.com" },
]
dependencies = [
  "fastapi>=0.115.0",
  "uvicorn[standard]>=0.30.0",
  "python-multipart>=0.0.9",
  "requests",
  "markitdown[all]>=0.1.1,<0.2.0",
]

[project.optional-dependencies]
test = [
  "httpx>=0.27.0",
  "pytest>=8.0.0",
]

[project.scripts]
markitdown-web = "markitdown_web.__main__:main"

[tool.hatch.version]
path = "src/markitdown_web/__about__.py"

[tool.hatch.build.targets.sdist]
only-include = ["src/markitdown_web", "README.md"]

[tool.hatch.build.targets.wheel]
packages = ["src/markitdown_web"]

[tool.hatch.envs.default]
features = ["test"]

[tool.hatch.envs.default.scripts]
test = "pytest {args:tests}"
