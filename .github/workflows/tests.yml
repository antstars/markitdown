name: tests
on: [pull_request]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: |
            3.10
            3.11
            3.12
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/markitdown-web/frontend/package-lock.json
      - name: Install Hatch
        run: pipx install hatch
      - name: Run MarkItDown tests
        run: cd packages/markitdown; hatch test
      - name: Run MarkItDown Web tests
        run: |
          python -m pip install -e packages/markitdown -e packages/markitdown-web[test]
          python -m pytest packages/markitdown-web/tests
      - name: Build MarkItDown Web frontend
        run: |
          cd packages/markitdown-web/frontend
          npm ci
          npm run build
